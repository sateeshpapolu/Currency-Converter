<!DOCTYPE html>
<html>
<head>
    <title>Currency Converter</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:350px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input,select,button{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        #result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Currency Converter</h2>

    <input type="number" id="amount" placeholder="Enter Amount">

    <select id="fromCurrency">
        <option value="USD">USD</option>
        <option value="INR">INR</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
    </select>

    <select id="toCurrency">
        <option value="INR">INR</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
    </select>

    <button onclick="convertCurrency()">
        Convert
    </button>

    <div id="result"></div>

</div>

<script>

function convertCurrency()
{
    let amount =
    parseFloat(document.getElementById("amount").value);

    let from =
    document.getElementById("fromCurrency").value;

    let to =
    document.getElementById("toCurrency").value;

    let rates =
    {
        USD:1,
        INR:83,
        EUR:0.92,
        GBP:0.79
    };

    let usdAmount =
    amount / rates[from];

    let converted =
    usdAmount * rates[to];

    document.getElementById("result").innerHTML =
    amount + " " + from +
    " = " +
    converted.toFixed(2) +
    " " + to;
}

</script>

</body>
</html>
